<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOP: password display -->
    <div class="top-panel">
        <div class="copy-tooltip" id="copy-tooltip">Copied!</div>
        <div class="password-wrap">
            <div class="password-display" id="password"></div>
        </div>
        <div class="strength-wrap">
            <div class="strength-bar-track"><div id="strength-bar"></div></div>
        </div>
        <button id="copy-btn" class="btn btn-secondary">Copy</button>
    </div>

    <!-- BOTTOM: options -->
    <div class="bottom-panel">
        <div class="options-inner">

            <!-- Length card -->
            <div class="type-card" id="card-length">
                <div class="length-inner">
                    <div class="length-header">
                        <span class="type-label">Length</span>
                        <input id="length-num" type="number" min="4" max="64" value="16">
                    </div>
                    <input id="length-slider" type="range" min="4" max="64" value="16">
                </div>
            </div>

            <!-- Character type cards -->
            <div class="type-cards">

                <div class="type-card active" id="card-upper">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Uppercase</span>
                            <span class="type-sub">A–Z</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-upper" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <div class="type-card active" id="card-lower">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Lowercase</span>
                            <span class="type-sub">a–z</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-lower" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <div class="type-card active" id="card-numbers">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Numbers</span>
                            <span class="type-sub">0–9</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-numbers" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <!-- Symbols — full width, expandable -->
                <div class="type-card" id="card-symbols">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Symbols</span>
                            <span class="type-sub">!@#…</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-symbols">
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                    <div class="symbol-options" id="symbol-options">
                        <div class="sym-opts-inner">

                            <div class="sym-opt-row">
                                <input type="checkbox" id="opt-limit-sym">
                                <label for="opt-limit-sym">Limit symbols to</label>
                                <input id="max-sym-num" type="number" min="1" max="64" value="3" disabled>
                                <input id="max-sym-slider" type="range" min="1" max="16" value="3" disabled>
                                <span class="sym-count-val" id="max-sym-display">3</span>
                            </div>

                            <div class="sym-opt-row">
                                <input type="checkbox" id="opt-sym-first" checked>
                                <label for="opt-sym-first">Allow as first character</label>
                            </div>

                            <div>
                                <div class="sym-picker-label">Included symbols</div>
                                <div class="sym-chip-controls">
                                    <button id="sym-all">All</button>
                                    <button id="sym-none">None</button>
                                </div>
                                <div class="symbol-picker" id="symbol-picker"></div>
                            </div>

                        </div>
                    </div>
                </div>

            </div><!-- /type-cards -->

            <div id="validation-msg"></div>
            <button id="generate-btn" class="btn btn-primary">Generate</button>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
