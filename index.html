<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            font-family: 'Noto Sans', sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ── TOP PANEL ── */
        .top-panel {
            position: relative;
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 2rem;                             /* 32px between pw / bar / copy */
            background: linear-gradient(160deg, #12122a 0%, #1a1a2e 100%);
            overflow: hidden;                      /* clip pw overflow — no scrollbar */
            transition: background 0.65s ease;
            isolation: isolate;                    /* contain sparkle z-index */
        }

        /* Tooltip floats above password, pinned to top of panel */
        .copy-tooltip {
            position: absolute;
            top: 1.1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(127, 90, 240, 0.93);
            color: #fff;
            padding: 0.35rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            white-space: nowrap;
            letter-spacing: 0.05em;
            z-index: 2;
        }
        @keyframes tooltipFade {
            0%   { opacity: 0; transform: translateX(-50%) translateY(-5px); }
            15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            75%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-5px); }
        }
        .copy-tooltip.show { animation: tooltipFade 1.6s ease forwards; }

        /* Password — no scrollbar, clips inside top-panel overflow:hidden */
        .password-wrap { width: 100%; }
        .password-display {
            font-family: 'Arvo', serif;
            font-weight: 700;
            font-size: clamp(2rem, 8vw, 5rem);
            word-break: break-all;
            text-align: center;
            line-height: 1.15;
            width: 100%;
            overflow: hidden;                      /* no scrollbar */
            cursor: pointer;
            transition: filter 0.15s;
        }
        .password-display:hover { filter: brightness(1.12); }

        /* Character colour classes */
        .ch-upper { color: #93c5fd; }
        .ch-lower { color: #e2e8f0; }
        .ch-num   { color: #4ade80; }
        .ch-sym   { color: #fb923c; }

        /* Error message rendered inside the password area */
        .pw-error {
            color: #f87171;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            font-family: 'Noto Sans', sans-serif;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 0;
        }

        /* ── Strength bar — centre-expanding fire bar ── */
        .strength-wrap { width: min(440px, 90%); }
        .strength-bar-track {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.04);
            border-radius: 3px;
            display: flex;
            justify-content: center;   /* bar grows outward from centre */
            overflow: visible;         /* let glow escape the track bounds */
        }
        #strength-bar {
            height: 100%;
            width: 0px;
            border-radius: 3px;
            transition: width 0.55s cubic-bezier(0.34,1.2,0.64,1),
                        box-shadow 0.55s ease,
                        background 0.45s ease;
            animation: flamePulse 3s ease-in-out infinite;
        }
        @keyframes flamePulse {
            0%, 100% { filter: brightness(1);    }
            40%      { filter: brightness(1.45); }
            72%      { filter: brightness(0.85); }
        }
        @keyframes crispPulse {
            0%, 100% { filter: brightness(1)    saturate(1.05); }
            30%      { filter: brightness(1.22) saturate(1.18); }
            65%      { filter: brightness(0.9)  saturate(0.96); }
        }

        /* ── Sparkle field ── */
        .sparkle-field {
            position: absolute;
            inset: 0;
            z-index: -1;           /* behind all panel content, above panel background */
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .sparkle {
            position: absolute;
            border-radius: 50%;
            background: var(--spark-color, rgba(134,239,172,0.8));
            opacity: 0;
            animation: sparkleTwinkle var(--dur, 1.5s) ease-in-out infinite var(--delay, 0s);
        }
        .sparkle.warping {
            animation: sparkleWarp var(--dur, 1.0s) linear infinite var(--delay, 0s);
        }
        @keyframes sparkleTwinkle {
            0%, 100% { opacity: 0;   transform: scale(0.3); }
            50%      { opacity: 1;   transform: scale(1.3); }
        }
        @keyframes sparkleWarp {
            0%   { opacity: var(--start-op, 0);         transform: rotate(var(--angle,0deg)) translateX(0)                              scaleX(0.5)                      scaleY(1); }
            20%  { opacity: var(--start-op, 0);         transform: rotate(var(--angle,0deg)) translateX(calc(var(--travel) * 0.2))       scaleX(2)                        scaleY(1); }
            30%  { opacity: var(--peak-op, 1);        transform: rotate(var(--angle,0deg)) translateX(calc(var(--travel) * 0.3))       scaleX(var(--wx,8))              scaleY(1); }
            85%  { opacity: var(--peak-op, 1);        transform: rotate(var(--angle,0deg)) translateX(var(--travel))                   scaleX(var(--wx,8))              scaleY(1); }
            100% { opacity: 0;                        transform: rotate(var(--angle,0deg)) translateX(var(--travel2))                  scaleX(calc(var(--wx,8) * 0.7))  scaleY(1); }
        }

        /* ── Shared button base ── */
        .btn {
            font-family: 'Noto Sans', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            border: 2px solid #7f5af0;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            white-space: nowrap;
        }
        /* Primary — filled purple */
        .btn-primary {
            background: #7f5af0;
            color: #fff;
        }
        .btn-primary:hover  { background: #6b46e0; border-color: #6b46e0; }
        .btn-primary:active { background: #5a35cf; border-color: #5a35cf; }

        /* Secondary — neutral ghost */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #7a7a99;
            border-color: rgba(255, 255, 255, 0.11);
        }
        .btn-secondary:hover  { background: rgba(255, 255, 255, 0.09); color: #a8a8cc; border-color: rgba(255,255,255,0.2); }
        .btn-secondary.copied { border-color: #2cb67d; color: #2cb67d; background: rgba(44,182,125,0.12); }

        /* Generate spans full width */
        #generate-btn { width: 100%; }

        /* ── BOTTOM PANEL ── */
        .bottom-panel {
            height: 50vh;
            overflow-y: auto;
            border-top: 1px solid #222244;
            padding: 1rem 1.25rem;
            background: #16213e;
        }
        .options-inner { max-width: 580px; margin: 0 auto; }

        /* ── Card shared base (used for length + type cards) ── */
        .type-card {
            background: #0d0d20;
            border: 1px solid #1e1e38;
            border-radius: 9px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        /* ── Length card ── */
        #card-length {
            border-color: rgba(127, 90, 240, 0.28);
            margin-bottom: 0.4rem;
        }
        .length-inner { padding: 16px; }
        .length-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        #card-length .type-label { color: #9070d8; }

        /* Sleek custom range slider */
        #length-slider {
            display: block;
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            background: linear-gradient(to right, #7f5af0 50%, #1e1e3a 50%);
        }
        #length-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #7f5af0;
            cursor: pointer;
            border: 2px solid #16213e;
            box-shadow: 0 0 0 2px rgba(127,90,240,0.28);
            transition: box-shadow 0.15s, transform 0.1s;
        }
        #length-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 5px rgba(127,90,240,0.28);
            transform: scale(1.1);
        }
        #length-slider::-moz-range-thumb {
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #7f5af0;
            cursor: pointer;
            border: 2px solid #16213e;
        }

        #length-num {
            width: 4.6rem;
            background: rgba(127, 90, 240, 0.1);
            border: 1px solid rgba(127, 90, 240, 0.35);
            border-radius: 6px;
            color: #c4b5fd;
            font-family: 'Noto Sans', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            padding: 0.3rem 0.25rem 0.3rem 0.55rem;
            text-align: center;
            outline: none;
            transition: border-color 0.15s;
        }
        #length-num:focus { border-color: #7f5af0; }
        /* Style the native spinner arrows */
        #length-num::-webkit-inner-spin-button,
        #length-num::-webkit-outer-spin-button {
            opacity: 1;
            cursor: pointer;
            background: rgba(127, 90, 240, 0.18);
            border-left: 1px solid rgba(127, 90, 240, 0.28);
            border-radius: 0 5px 5px 0;
        }

        /* ── Type cards grid ── */
        .type-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }
        #card-symbols { grid-column: 1 / -1; }

        /* Whole header is a <label> → full area is clickable */
        .type-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;                         /* airy 16px all around */
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
            border-radius: 9px 9px 0 0;
        }
        .type-card-header:hover { background: rgba(255,255,255,0.03); }

        .type-info { display: flex; flex-direction: column; gap: 4px; }
        .type-label { font-size: 14px; font-weight: 400; color: #55557a; transition: color 0.2s; }
        .type-sub   { font-size: 0.72rem; font-weight: 400; transition: color 0.2s; }

        /* Inactive */
        .type-card:not(.active) .type-sub { color: #252545; }

        /* Active borders + per-type colours */
        #card-upper.active   { border-color: rgba(147,197,253,0.3); }
        #card-upper   .type-sub   { color: #93c5fd; }
        #card-upper.active   .type-label { color: #8899bb; }

        #card-lower.active   { border-color: rgba(200,215,235,0.18); }
        #card-lower   .type-sub   { color: #8899b8; }
        #card-lower.active   .type-label { color: #8899bb; }

        #card-numbers.active { border-color: rgba(74,222,128,0.28); }
        #card-numbers .type-sub   { color: #4ade80; }
        #card-numbers.active .type-label { color: #8899bb; }

        #card-symbols.active { border-color: rgba(251,146,60,0.28); }
        #card-symbols .type-sub   { color: #fb923c; }
        #card-symbols.active .type-label { color: #8899bb; }

        /* Toggle switch */
        .toggle-switch { position: relative; width: 33px; height: 18px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; position: absolute; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #1a1a38;
            border: 1px solid #2a2a50;
            border-radius: 9px;
            transition: background 0.2s, border-color 0.2s;
        }
        .toggle-track::after {
            content: '';
            position: absolute;
            left: 2px; top: 2px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #333358;
            transition: transform 0.2s, background 0.2s;
        }

        #card-upper   input:checked ~ .toggle-track { background: rgba(147,197,253,0.18); border-color: #93c5fd; }
        #card-upper   input:checked ~ .toggle-track::after { transform: translateX(15px); background: #93c5fd; }
        #card-lower   input:checked ~ .toggle-track { background: rgba(200,215,235,0.12); border-color: #9aabbb; }
        #card-lower   input:checked ~ .toggle-track::after { transform: translateX(15px); background: #e2e8f0; }
        #card-numbers input:checked ~ .toggle-track { background: rgba(74,222,128,0.16); border-color: #4ade80; }
        #card-numbers input:checked ~ .toggle-track::after { transform: translateX(15px); background: #4ade80; }
        #card-symbols input:checked ~ .toggle-track { background: rgba(251,146,60,0.16); border-color: #fb923c; }
        #card-symbols input:checked ~ .toggle-track::after { transform: translateX(15px); background: #fb923c; }

        /* ── Symbol sub-options (max-height collapse) ── */
        .symbol-options { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
        .symbol-options.visible { max-height: 700px; }

        .sym-opts-inner {
            padding: 16px;                         /* airy 16px all around */
            border-top: 1px solid #1e1e38;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .sym-opt-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
        .sym-opt-row label { font-size: 0.78rem; color: #6666aa; white-space: nowrap; }
        .sym-opt-row input[type="checkbox"] { accent-color: #fb923c; cursor: pointer; }
        .sym-opt-row input[type="number"] {
            width: 3.25rem;
            background: #16213e;
            border: 1px solid #2d2d5e;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Noto Sans', sans-serif;
            font-size: 0.78rem;
            padding: 0.18rem 0.3rem;
            text-align: center;
            outline: none;
        }
        .sym-opt-row input[type="range"] { flex: 1; min-width: 80px; }
        .sym-opt-row input:disabled { opacity: 0.3; cursor: not-allowed; }
        .sym-count-val { font-size: 0.78rem; color: #fb923c; min-width: 1.5rem; }

        /* Custom orange symbol slider — matches length slider styling */
        #max-sym-slider {
            display: block;
            -webkit-appearance: none;
            appearance: none;
            height: 3px;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            background: linear-gradient(to right, #fb923c 20%, #1e1e3a 20%);
        }
        #max-sym-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #fb923c;
            cursor: pointer;
            border: 2px solid #16213e;
            box-shadow: 0 0 0 2px rgba(251,146,60,0.28);
            transition: box-shadow 0.15s, transform 0.1s;
        }
        #max-sym-slider::-webkit-slider-thumb:hover {
            box-shadow: 0 0 0 5px rgba(251,146,60,0.28);
            transform: scale(1.1);
        }
        #max-sym-slider::-moz-range-thumb {
            width: 15px; height: 15px;
            border-radius: 50%;
            background: #fb923c;
            cursor: pointer;
            border: 2px solid #16213e;
        }

        /* Symbol picker */
        .sym-picker-label {
            font-size: 0.68rem; color: #404060;
            text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.3rem;
        }
        .sym-chip-controls { display: flex; gap: 0.35rem; margin-bottom: 0.35rem; }
        .sym-chip-controls button {
            background: transparent;
            border: 1px solid #2d2d5e;
            border-radius: 4px;
            color: #555;
            cursor: pointer;
            font-family: 'Noto Sans', sans-serif;
            font-size: 0.68rem;
            padding: 0.1rem 0.45rem;
            transition: border-color 0.1s, color 0.1s;
        }
        .sym-chip-controls button:hover { border-color: #fb923c; color: #fb923c; }

        .symbol-picker { display: flex; flex-wrap: wrap; gap: 0.28rem; }
        .sym-chip {
            background: #1a1a3e;
            border: 1px solid #2a2a5a;
            border-radius: 4px;
            color: #fb923c;
            cursor: pointer;
            font-family: 'Noto Sans', sans-serif;
            font-size: 0.88rem;
            padding: 0.18rem 0.42rem;
            transition: background 0.1s, border-color 0.1s, color 0.1s;
            user-select: none;
            line-height: 1.3;
        }
        .sym-chip:hover { border-color: #fb923c; background: #1f1008; }
        .sym-chip.off { background: transparent; border-color: #1c1c38; color: #2a2a4a; }

        /* Validation — errors now shown in the password area instead */
        #validation-msg { display: none; }
    </style>
</head>
<body>

    <!-- TOP: password display -->
    <div class="top-panel">
        <div class="copy-tooltip" id="copy-tooltip">Copied!</div>
        <div class="password-wrap">
            <div class="password-display" id="password"></div>
        </div>
        <div class="strength-wrap">
            <div class="strength-bar-track"><div id="strength-bar"></div></div>
        </div>
        <button id="copy-btn" class="btn btn-secondary">Copy</button>
    </div>

    <!-- BOTTOM: options -->
    <div class="bottom-panel">
        <div class="options-inner">

            <!-- Length card -->
            <div class="type-card" id="card-length">
                <div class="length-inner">
                    <div class="length-header">
                        <span class="type-label">Length</span>
                        <input id="length-num" type="number" min="4" max="64" value="16">
                    </div>
                    <input id="length-slider" type="range" min="4" max="64" value="16">
                </div>
            </div>

            <!-- Character type cards -->
            <div class="type-cards">

                <div class="type-card active" id="card-upper">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Uppercase</span>
                            <span class="type-sub">A–Z</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-upper" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <div class="type-card active" id="card-lower">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Lowercase</span>
                            <span class="type-sub">a–z</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-lower" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <div class="type-card active" id="card-numbers">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Numbers</span>
                            <span class="type-sub">0–9</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-numbers" checked>
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                </div>

                <!-- Symbols — full width, expandable -->
                <div class="type-card" id="card-symbols">
                    <label class="type-card-header">
                        <div class="type-info">
                            <span class="type-label">Symbols</span>
                            <span class="type-sub">!@#…</span>
                        </div>
                        <div class="toggle-switch">
                            <input type="checkbox" id="opt-symbols">
                            <div class="toggle-track"></div>
                        </div>
                    </label>
                    <div class="symbol-options" id="symbol-options">
                        <div class="sym-opts-inner">

                            <div class="sym-opt-row">
                                <input type="checkbox" id="opt-limit-sym">
                                <label for="opt-limit-sym">Limit symbols to</label>
                                <input id="max-sym-num" type="number" min="1" max="64" value="3" disabled>
                                <input id="max-sym-slider" type="range" min="1" max="16" value="3" disabled>
                                <span class="sym-count-val" id="max-sym-display">3</span>
                            </div>

                            <div class="sym-opt-row">
                                <input type="checkbox" id="opt-sym-first" checked>
                                <label for="opt-sym-first">Allow as first character</label>
                            </div>

                            <div>
                                <div class="sym-picker-label">Included symbols</div>
                                <div class="sym-chip-controls">
                                    <button id="sym-all">All</button>
                                    <button id="sym-none">None</button>
                                </div>
                                <div class="symbol-picker" id="symbol-picker"></div>
                            </div>

                        </div>
                    </div>
                </div>

            </div><!-- /type-cards -->

            <div id="validation-msg"></div>
            <button id="generate-btn" class="btn btn-primary">Generate</button>

        </div>
    </div>

    <script>
        const DEFAULT_SYMBOLS = '!@#$%^&*()-_=+[]{}|;:,.<>?';
        const CHAR_SETS = {
            upper:   'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower:   'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
        };
        const HTML_ESC = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };

        const elPassword      = document.getElementById('password');
        const elTooltip       = document.getElementById('copy-tooltip');
        const elCopyBtn       = document.getElementById('copy-btn');
        const elStrengthBar   = document.getElementById('strength-bar');
        const elTopPanel      = document.querySelector('.top-panel');

        // Sparkle field — inserted as first child so z-index: -1 works within panel context
        const elSparkleField = document.createElement('div');
        elSparkleField.className = 'sparkle-field';
        elSparkleField.style.opacity = '0';
        elTopPanel.insertBefore(elSparkleField, elTopPanel.firstChild);

        const elLengthNum     = document.getElementById('length-num');
        const elLengthSlider  = document.getElementById('length-slider');
        const elSymOptions    = document.getElementById('symbol-options');
        const elLimitSym      = document.getElementById('opt-limit-sym');
        const elMaxSymNum     = document.getElementById('max-sym-num');
        const elMaxSymSlider  = document.getElementById('max-sym-slider');
        const elMaxSymDisplay = document.getElementById('max-sym-display');
        const elSymFirst      = document.getElementById('opt-sym-first');
        const elSymPicker     = document.getElementById('symbol-picker');

        const checkboxes = {
            upper:   document.getElementById('opt-upper'),
            lower:   document.getElementById('opt-lower'),
            numbers: document.getElementById('opt-numbers'),
            symbols: document.getElementById('opt-symbols'),
        };

        let currentPassword = '';
        let sparkleState    = null;   // null | 'green' | 'amazing' | 'warp-low' | 'warp-med' | 'warp-high'

        // ── Slider fill gradient ──
        function updateSliderTrack(slider, color) {
            const pct = ((slider.value - slider.min) / (slider.max - slider.min)) * 100;
            slider.style.background =
                `linear-gradient(to right, ${color} ${pct}%, #1e1e3a ${pct}%)`;
        }
        updateSliderTrack(elLengthSlider, '#7f5af0');
        updateSliderTrack(elMaxSymSlider, '#fb923c');

        // ── Password rendering ──
        function charClass(ch) {
            if (CHAR_SETS.upper.includes(ch))   return 'ch-upper';
            if (CHAR_SETS.lower.includes(ch))   return 'ch-lower';
            if (CHAR_SETS.numbers.includes(ch)) return 'ch-num';
            return 'ch-sym';
        }
        function renderPassword(pw) {
            currentPassword = pw;
            elPassword.innerHTML = [...pw]
                .map(ch => `<span class="${charClass(ch)}">${HTML_ESC[ch] ?? ch}</span>`)
                .join('');
        }
        function clearDisplay() { currentPassword = ''; elPassword.innerHTML = ''; }
        function showError(msg) {
            currentPassword = '';
            elPassword.innerHTML = `<span class="pw-error">${msg}</span>`;
        }

        // ── Copy ──
        let copyTimer = null;
        function copyPassword() {
            if (!currentPassword) return;
            navigator.clipboard.writeText(currentPassword).then(() => {
                elTooltip.classList.remove('show');
                void elTooltip.offsetWidth;
                elTooltip.classList.add('show');
                elCopyBtn.textContent = 'Copied!';
                elCopyBtn.classList.add('copied');
                clearTimeout(copyTimer);
                copyTimer = setTimeout(() => {
                    elCopyBtn.textContent = 'Copy';
                    elCopyBtn.classList.remove('copied');
                }, 2000);
            });
        }
        elPassword.addEventListener('click', copyPassword);
        elCopyBtn.addEventListener('click',  copyPassword);

        // ── Card toggles ──
        ['upper', 'lower', 'numbers', 'symbols'].forEach(key => {
            const cb   = checkboxes[key];
            const card = document.getElementById(`card-${key}`);
            card.classList.toggle('active', cb.checked);
            cb.addEventListener('change', () => {
                card.classList.toggle('active', cb.checked);
                if (key === 'symbols') elSymOptions.classList.toggle('visible', cb.checked);
                generate();
            });
        });

        // ── Symbol chips ──
        for (const sym of DEFAULT_SYMBOLS) {
            const btn = document.createElement('button');
            btn.className = 'sym-chip';
            btn.textContent = sym;
            btn.dataset.sym = sym;
            btn.addEventListener('click', () => { btn.classList.toggle('off'); generate(); });
            elSymPicker.appendChild(btn);
        }
        document.getElementById('sym-all').addEventListener('click', () => {
            elSymPicker.querySelectorAll('.sym-chip').forEach(c => c.classList.remove('off'));
            generate();
        });
        document.getElementById('sym-none').addEventListener('click', () => {
            elSymPicker.querySelectorAll('.sym-chip').forEach(c => c.classList.add('off'));
            generate();
        });
        function getSelectedSymbols() {
            return [...elSymPicker.querySelectorAll('.sym-chip:not(.off)')]
                .map(c => c.dataset.sym).join('');
        }

        // ── Limit-symbols ──
        elLimitSym.addEventListener('change', () => {
            elMaxSymNum.disabled    = !elLimitSym.checked;
            elMaxSymSlider.disabled = !elLimitSym.checked;
            updateSliderTrack(elMaxSymSlider, '#fb923c');
            generate();
        });
        elMaxSymNum.addEventListener('input', () => {
            let v = parseInt(elMaxSymNum.value, 10);
            if (isNaN(v) || v < 1) v = 1;
            v = Math.min(v, parseInt(elLengthNum.value, 10));
            elMaxSymNum.value = v;
            elMaxSymSlider.value = Math.min(v, parseInt(elMaxSymSlider.max, 10));
            elMaxSymDisplay.textContent = v;
            updateSliderTrack(elMaxSymSlider, '#fb923c');
            generate();
        });
        elMaxSymSlider.addEventListener('input', () => {
            const v = parseInt(elMaxSymSlider.value, 10);
            elMaxSymNum.value = v;
            elMaxSymDisplay.textContent = v;
            updateSliderTrack(elMaxSymSlider, '#fb923c');
            generate();
        });
        elSymFirst.addEventListener('change', generate);

        // ── Crypto RNG ──
        function cryptoRandInt(max) {
            const a = new Uint32Array(1);
            crypto.getRandomValues(a);
            return a[0] % max;
        }
        function getEnabledKeys() {
            return Object.keys(checkboxes).filter(k => checkboxes[k].checked);
        }

        // ── Password generation ──
        function generatePassword(length, enabledKeys) {
            const selectedSymbols = getSelectedSymbols();
            const maxSymbols = (checkboxes.symbols.checked && elLimitSym.checked)
                ? parseInt(elMaxSymNum.value, 10) : Infinity;
            const symbolsNotFirst = checkboxes.symbols.checked && !elSymFirst.checked;

            const sets = {};
            for (const k of enabledKeys)
                sets[k] = k === 'symbols' ? selectedSymbols : CHAR_SETS[k];

            const validKeys = enabledKeys.filter(k => sets[k] && sets[k].length > 0);
            if (validKeys.length === 0 || length < validKeys.length) return null;

            const chars = [];
            let symCount = 0;
            for (const k of validKeys) {
                const ch = sets[k][cryptoRandInt(sets[k].length)];
                chars.push(ch);
                if (k === 'symbols') symCount++;
            }
            for (let i = chars.length; i < length; i++) {
                const pool = validKeys
                    .filter(k => k !== 'symbols' || symCount < maxSymbols)
                    .map(k => sets[k]).join('');
                if (!pool.length) return null;
                const ch = pool[cryptoRandInt(pool.length)];
                if (validKeys.includes('symbols') && sets.symbols.includes(ch)) symCount++;
                chars.push(ch);
            }
            for (let i = chars.length - 1; i > 0; i--) {
                const j = cryptoRandInt(i + 1);
                [chars[i], chars[j]] = [chars[j], chars[i]];
            }
            if (symbolsNotFirst && validKeys.includes('symbols') && sets.symbols.length > 0) {
                if (sets.symbols.includes(chars[0])) {
                    const si = chars.findIndex(c => !sets.symbols.includes(c));
                    if (si > 0) [chars[0], chars[si]] = [chars[si], chars[0]];
                }
            }
            return chars.join('');
        }

        // ── Strength — entropy-based, 0–100 score ──
        function computeStrengthScore(length, enabledKeys) {
            if (enabledKeys.length === 0) return 0;
            let charsetSize = 0;
            for (const k of enabledKeys) {
                if (k === 'symbols') charsetSize += getSelectedSymbols().length;
                else charsetSize += CHAR_SETS[k].length;
            }
            if (charsetSize <= 1) return 0;
            const entropy = length * Math.log2(charsetSize);
            // 10 bits → score 0, 175 bits → score 100  (max ~28 chars with all types)
            return Math.min(100, Math.max(0, (entropy - 10) / 165 * 100));
        }

        const BASE_BG = 'linear-gradient(160deg, #12122a 0%, #1a1a2e 100%)';

        // ── Sparkles (twinkle for score ≥ 44, warp-streaks for length ≥ 30) ──
        function updateSparkles(score, len) {
            let newState;
            if      (len >= 56)   newState = 'warp-high';
            else if (len >= 42)   newState = 'warp-med';
            else if (len >= 30)   newState = 'warp-low';
            else if (score >= 90) newState = 'amazing';
            else if (score >= 44) newState = 'green';
            else                  newState = null;

            if (newState === sparkleState) return;
            sparkleState = newState;

            elSparkleField.innerHTML = '';
            if (!newState) { elSparkleField.style.opacity = '0'; return; }

            let count, color, warping = false, warpX = 1;
            if (newState === 'green') {
                count = 14; color = 'rgba(134,239,172,0.82)';
            } else if (newState === 'amazing') {
                count = 26; color = 'rgba(200,255,220,0.9)';
            } else if (newState === 'warp-low') {
                count = 60;  color = 'rgba(134,239,172,0.76)'; warping = true; warpX = 7;
            } else if (newState === 'warp-med') {
                count = 150; color = 'rgba(167,243,208,0.84)'; warping = true; warpX = 12;
            } else { // warp-high
                count = 225; color = 'rgba(200,250,230,0.9)';  warping = true; warpX = 18;
            }

            for (let i = 0; i < count; i++) {
                const s = document.createElement('span');
                s.className = 'sparkle' + (warping ? ' warping' : '');
                s.style.left   = warping ? '50%' : (3 + Math.random() * 94) + '%';
                s.style.top    = warping ? '50%' : (3 + Math.random() * 94) + '%';
                const sz = (warping ? 2 + Math.random() * 8 : 2 + Math.random() * 4).toFixed(1);
                s.style.width  = warping ? '1px' : sz + 'px';
                s.style.height = sz + 'px';
                const warpSpeed = newState === 'warp-high' ? 0.25 + Math.random() * 0.45
                               : newState === 'warp-med'  ? 0.35 + Math.random() * 0.65
                               :                            0.5  + Math.random() * 0.9;
                const baseDur = warping ? warpSpeed : 0.9 + Math.random() * 2.2;
                s.style.setProperty('--dur',         baseDur.toFixed(2) + 's');
                s.style.setProperty('--delay',       (-Math.random() * (warping ? 2 : 3)).toFixed(2) + 's');
                s.style.setProperty('--spark-color', color);
                if (warping) {
                    s.style.setProperty('--angle',   (Math.random() * 360).toFixed(1) + 'deg');
                    s.style.setProperty('--wx',      (warpX * (0.5 + Math.random())).toFixed(1));
                    s.style.setProperty('--peak-op', (0.45 + Math.random() * 0.55).toFixed(2));
                    s.style.setProperty('--start-op', Math.random() < 0.2 ? (0.3 + Math.random() * 0.5).toFixed(2) : '0');
                    const travel = 350 + Math.random() * 450;
                    s.style.setProperty('--travel',  travel.toFixed(0) + 'px');
                    s.style.setProperty('--travel2', (travel * 1.4).toFixed(0) + 'px');
                }
                elSparkleField.appendChild(s);
            }
            elSparkleField.style.opacity = '1';
        }

        function updateStrengthUI(score) {
            if (score === null) {
                elStrengthBar.style.width         = '0px';
                elStrengthBar.style.background    = 'transparent';
                elStrengthBar.style.boxShadow     = 'none';
                elStrengthBar.style.animationName = 'none';
                elTopPanel.style.background       = BASE_BG;
                updateSparkles(null, 0);
                return;
            }

            const len   = parseInt(elLengthNum.value, 10);
            // Width: 40 px (score 0) → 440 px (score 100)
            const width = Math.round(40 + score * 4.0);

            let bg, shadow, dur, tintRgb, animName = 'flamePulse';

            if (score < 10) {
                bg       = 'linear-gradient(90deg,#1a0505,#5c1111,#7f1d1d,#5c1111,#1a0505)';
                shadow   = '0 0 4px 1px rgba(127,29,29,0.4)';
                dur      = '3.5s'; tintRgb = '120,20,20';
            } else if (score < 22) {
                bg       = 'linear-gradient(90deg,#7f1d1d,#b91c1c,#dc2626,#b91c1c,#7f1d1d)';
                shadow   = '0 0 6px 2px rgba(185,28,28,0.5),'
                         + '0 0 14px 3px rgba(127,29,29,0.22)';
                dur      = '3s'; tintRgb = '185,28,28';
            } else if (score < 34) {
                bg       = 'linear-gradient(90deg,#991b1b,#dc2626,#ea580c,#dc2626,#991b1b)';
                shadow   = '0 0 7px 2px rgba(220,38,38,0.52),'
                         + '0 0 18px 4px rgba(153,27,27,0.24)';
                dur      = '2.5s'; tintRgb = '210,55,20';
            } else if (score < 40) {
                // Orange
                bg       = 'linear-gradient(90deg,#c2410c,#ea580c,#f97316,#ea580c,#c2410c)';
                shadow   = '0 0 8px 2px rgba(234,88,12,0.54),'
                         + '0 0 20px 4px rgba(194,65,12,0.26),'
                         + '0 0 32px 5px rgba(127,29,29,0.1)';
                dur      = '2s'; tintRgb = '234,88,12';
            } else if (score < 44) {
                // Warm golden-amber — brief bridge (~length 12–13)
                bg       = 'linear-gradient(90deg,#d97706,#f59e0b,#fbbf24,#f59e0b,#d97706)';
                shadow   = '0 0 9px 3px rgba(251,191,36,0.54),'
                         + '0 0 22px 5px rgba(245,158,11,0.28),'
                         + '0 0 38px 6px rgba(217,119,6,0.12)';
                dur      = '1.7s'; tintRgb = '245,158,11';
            } else if (score < 64) {
                // Lime / yellow-green — soft green starts ~length 14
                bg       = 'linear-gradient(90deg,#65a30d,#84cc16,#a3e635,#84cc16,#65a30d)';
                shadow   = '0 0 9px 3px rgba(163,230,53,0.52),'
                         + '0 0 22px 5px rgba(132,204,22,0.28),'
                         + '0 0 38px 6px rgba(101,163,13,0.12)';
                dur      = '1.4s'; tintRgb = '132,204,22';
            } else if (score < 82) {
                // Medium green — crisper pulse from here
                bg       = 'linear-gradient(90deg,#15803d,#22c55e,#4ade80,#22c55e,#15803d)';
                shadow   = '0 0 8px 2px rgba(74,222,128,0.9),'
                         + '0 0 20px 5px rgba(34,197,94,0.6),'
                         + '0 0 36px 8px rgba(22,163,74,0.3),'
                         + '0 0 50px 10px rgba(22,163,74,0.12)';
                dur      = '1.1s'; tintRgb = '34,197,94'; animName = 'crispPulse';
            } else {
                // Amazing — mint center (no white), sharp intense glow
                bg       = 'linear-gradient(90deg,#22c55e,#4ade80,#a7f3d0,#4ade80,#22c55e)';
                shadow   = '0 0 8px 2px rgba(134,239,172,0.95),'
                         + '0 0 18px 5px rgba(74,222,128,0.78),'
                         + '0 0 34px 8px rgba(34,197,94,0.45),'
                         + '0 0 52px 11px rgba(22,163,74,0.22),'
                         + '0 0 70px 14px rgba(22,163,74,0.08)';
                dur      = '0.65s'; tintRgb = '80,240,120'; animName = 'crispPulse';
            }

            elStrengthBar.style.width      = width + 'px';
            elStrengthBar.style.background = bg;
            elStrengthBar.style.boxShadow  = shadow;

            if (len >= 10) {
                elStrengthBar.style.animationName     = animName;
                elStrengthBar.style.animationDuration = dur;
            } else {
                elStrengthBar.style.animationName = 'none';
            }

            // Background: tint alpha scales with score (more intense as length grows),
            // plus a deepening blue-purple warp-core glow for length >= 30
            const tintAlpha = (0.05 + (score / 100) * 0.17).toFixed(3);
            const bgParts   = [];
            if (len >= 30) {
                const warpGlow = Math.min(1, (len - 30) / 38);
                const warpA    = (0.07 + warpGlow * 0.28).toFixed(3);
                bgParts.push(`radial-gradient(ellipse 52% 62% at 50% 50%, rgba(45,75,215,${warpA}) 0%, transparent 65%)`);
            }
            bgParts.push(`radial-gradient(ellipse 75% 85% at 50% 50%, rgba(${tintRgb},${tintAlpha}) 0%, transparent 70%)`);
            bgParts.push(BASE_BG);
            elTopPanel.style.background = bgParts.join(', ');

            updateSparkles(score, len);
        }

        // ── Generate ──
        function generate() {
            const length  = parseInt(elLengthNum.value, 10);
            const enabled = getEnabledKeys();
            if (enabled.length === 0) {
                showError('Select at least one character type.');
                updateStrengthUI(null); return;
            }
            if (checkboxes.symbols.checked && !getSelectedSymbols()) {
                showError('Select at least one symbol, or disable Symbols.');
                updateStrengthUI(null); return;
            }
            const pw = generatePassword(length, enabled);
            if (!pw) {
                showError('Length too short for selected options.');
                updateStrengthUI(null); return;
            }
            renderPassword(pw);
            updateStrengthUI(computeStrengthScore(length, enabled));
        }

        // ── Length sync ──
        elLengthSlider.addEventListener('input', () => {
            elLengthNum.value = elLengthSlider.value;
            updateSliderTrack(elLengthSlider, '#7f5af0');
            syncMaxSymMax(+elLengthSlider.value);
            generate();
        });
        elLengthNum.addEventListener('input', () => {
            let v = parseInt(elLengthNum.value, 10);
            if (isNaN(v)) return;
            v = Math.min(64, Math.max(4, v));
            elLengthNum.value    = v;
            elLengthSlider.value = v;
            updateSliderTrack(elLengthSlider, '#7f5af0');
            syncMaxSymMax(v);
            generate();
        });
        function syncMaxSymMax(len) {
            elMaxSymSlider.max = len;
            if (+elMaxSymNum.value > len) {
                elMaxSymNum.value = len;
                elMaxSymSlider.value = len;
                elMaxSymDisplay.textContent = len;
            }
            updateSliderTrack(elMaxSymSlider, '#fb923c');
        }

        document.getElementById('generate-btn').addEventListener('click', generate);
        generate();
    </script>
</body>
</html>
